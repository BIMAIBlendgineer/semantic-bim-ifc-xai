name: Public sample20 validation

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  validate-public-sample20:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Replay public sample20
        run: python harness/replay.py --sample sample20/

      - name: Validate public sample20 schema
        run: python harness/schema_validator.py sample20/sample20_public_records.jsonl

      - name: Run public forbidden scan
        run: python scripts/public_forbidden_scan.py

      - name: Install Hugging Face harness dependencies
        run: |
          python -m pip install -r spaces/huggingface_harness/requirements.txt

      - name: Run Hugging Face harness self-test
        run: python spaces/huggingface_harness/app.py --self-test
